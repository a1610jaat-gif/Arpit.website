<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Arpit</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top, #111, #000);
    }
  </style>
</head>

<body class="text-white flex flex-col items-center p-6">

  <!-- Title -->
  <h1 class="text-5xl font-bold tracking-widest mb-2">ARPIT</h1>
  <p class="text-gray-400 mb-8 text-center max-w-md">
    Write something about me... or leave your thoughts.
  </p>

  <!-- PUBLIC MESSAGE BOX -->
  <div class="w-full max-w-xl bg-white/5 backdrop-blur-xl border border-white/10 p-5 rounded-2xl shadow-xl mb-8">

    <div class="flex gap-2 mb-4">
      <input id="input" placeholder="Say something..."
        class="flex-1 p-3 rounded-xl bg-black border border-gray-700 focus:outline-none focus:border-white"/>
      <button onclick="addMessage()"
        class="px-4 py-2 rounded-xl bg-white text-black hover:bg-gray-300 transition">
        Post
      </button>
    </div>

    <div id="messages" class="space-y-3 max-h-72 overflow-y-auto"></div>
  </div>

  <!-- PRIVATE SECTION 😏 -->
  <div class="w-full max-w-xl bg-white/5 backdrop-blur-xl border border-white/10 p-5 rounded-2xl shadow-xl mb-6">

    <h2 class="text-lg mb-3 text-gray-300">🧠 Your Space (only you can see this)</h2>

    <textarea id="privateBox" placeholder="Write anything... thoughts, feelings, secrets 😏"
      class="w-full h-32 p-3 rounded-xl bg-black border border-gray-700 focus:outline-none focus:border-white"></textarea>

    <button onclick="savePrivate()"
      class="mt-3 px-4 py-2 rounded-xl bg-white text-black hover:bg-gray-300 transition">
      Save
    </button>

  </div>

  <!-- Insta -->
  <a href="https://instagram.com/arpit16_10" target="_blank"
    class="text-gray-500 hover:text-white transition">
    @arpit16_10
  </a>

  <script>
    // PUBLIC MESSAGES
    let messages = JSON.parse(localStorage.getItem("msgs") || "[]");

    function render() {
      const box = document.getElementById("messages");
      box.innerHTML = messages.map(m =>
        `<div class="p-3 rounded-xl bg-black border border-gray-800">${m}</div>`
      ).join("");
    }

    function addMessage() {
      const input = document.getElementById("input");
      if (!input.value.trim()) return;

      messages.unshift(input.value);
      localStorage.setItem("msgs", JSON.stringify(messages));
      input.value = "";
      render();
    }

    render();

    // PRIVATE SPACE
    const privateBox = document.getElementById("privateBox");

    function loadPrivate() {
      privateBox.value = localStorage.getItem("private_note") || "";
    }

    function savePrivate() {
      localStorage.setItem("private_note", privateBox.value);
      alert("Saved 😏");
    }

    loadPrivate();
  </script>

</body>
</html>
